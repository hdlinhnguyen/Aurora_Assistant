# Track B — độ nhất quán nhãn detected_gap. Mỗi nhóm là CÙNG MỘT misconception
# diễn đạt bằng nhiều cách khác nhau của học sinh — lý tưởng model phải sinh ra
# hội tụ về một cách gọi tên duy nhất (đo bằng purity, xem scoring.py).
# clean_paraphrases: học sinh làm ĐÚNG, dùng để đo spurious-gap rate (model báo
# gap dù không có lỗi).

- misconception_id: frac-add-wrong-denominator
  topic: "Cộng phân số khác mẫu số"
  mode: socratic
  paraphrases:
    - "1/2 cộng 1/3 bằng 2/5 ạ, em cộng tử với tử mẫu với mẫu"
    - "Em nghĩ 1/4 với 1/2 cộng lại ra 2/6 ạ"
    - "Theo em thì 2/3 cộng 1/4 là 3/7, cứ cộng thẳng vậy thôi ạ"
    - "1/5 cộng 2/3 chắc bằng 3/8 đúng không thầy, em cộng tử cộng mẫu"
    - "Em tính 3/4 cộng 1/2 ra 4/6 ạ"
  clean_paraphrases:
    - "1/2 cộng 1/3, em quy đồng mẫu số 6 rồi cộng ra 5/6 ạ"
    - "Em quy đồng trước rồi mới cộng, 1/4 cộng 1/2 ra 3/4 ạ"

- misconception_id: fraction-compare-numerator-only
  topic: "So sánh phân số"
  mode: socratic
  paraphrases:
    - "3/8 lớn hơn 2/5 vì 3 lớn hơn 2 ạ"
    - "Em thấy 5/9 nhỏ hơn 2/3 vì 5 to hơn 2 mà lại nhỏ hơn, chắc là do mẫu ạ, thôi em đoán 5/9 lớn hơn"
    - "1/6 với 3/4, tử 3 lớn hơn tử 1 nên 3/4 lớn hơn ạ"
  clean_paraphrases:
    - "3/8 với 2/5, em quy đồng ra 15/40 với 16/40 nên 2/5 lớn hơn ạ"
