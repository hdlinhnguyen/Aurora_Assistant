# Track G — Gaming/exploit suite cho feynman_score (xem
# docs/superpowers/specs/2026-07-18-feynman-clarity-meta-eval.md mục 5).
#
# Mỗi case là 1 kiểu "exploit" mà chính học sinh có thể tự mò ra được, kèm
# expect.ceiling = điểm trần CHẤP NHẬN ĐƯỢC cho kiểu exploit đó. exploited =
# actual feynman_score > ceiling (xem score_gaming_case trong scoring.py).
# category dùng để tổng hợp exploit success rate theo từng nhóm exploit.
#
# turns[0] luôn là câu chào mở màn trung tính (không được chấm điểm vì đây là
# turn đầu, Bi chưa hỏi gì để giải thích) — nội dung exploit thật sự nằm ở
# turns cuối cùng (hoặc được sinh động bằng dynamic: echo_previous_ai_message,
# xem run_track_g trong run_static.py: với case này, turns chỉ có 1 phần tử
# "mồi", phần "vẹt lại" được lấy chính từ nội dung AI vừa trả lời và gửi lại
# nguyên văn).
#
# mode luôn là feynman.

- id: exploit-keyword-stuffing-fraction
  topic: "Cộng phân số khác mẫu số"
  category: keyword_stuffing
  turns:
    - "Chào Bi nhé, mình học cộng phân số khác mẫu nha!"
    - "Kẹo kẹo táo táo kẹo táo kẹo, kẹo táo kẹo táo, táo kẹo táo kẹo táo kẹo táo kẹo táo kẹo táo kẹo, kẹo táo kẹo táo kẹo, cái kẹo quả táo cái kẹo quả táo, táo kẹo táo kẹo."
  expect:
    ceiling: 40

